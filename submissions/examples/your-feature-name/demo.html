<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism Card - EaseMotion Demo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css/easemotion.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body style="min-height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center;">
    <div class="glass-card">
        <h2 class="ease-fade-in">Glassmorphism Card</h2>
        <p class="ease-slide-up ease-delay-100">Modern blur effect with EaseMotion</p>
        <button class="ease-btn ease-btn-primary ease-hover-grow">Get Started</button>
    </div>
</body>
</html>
